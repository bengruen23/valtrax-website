<svg width="200" viewBox="0 0 200 420" xmlns="http://www.w3.org/2000/svg">
<style>
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}
@keyframes scan{0%{transform:translateY(-20px)}100%{transform:translateY(400px)}}
@keyframes flicker{0%,94%,100%{opacity:1}95%{opacity:.6}97%{opacity:.9}98%{opacity:.4}}
.m{animation:float 4s ease-in-out infinite;filter:url(#g)}
.fl{animation:flicker 7s ease-in-out infinite}
.p{animation:pulse 2s ease-in-out infinite}
.p2{animation:pulse 2.5s ease-in-out infinite;animation-delay:.5s}
.l{stroke:#4AEAFF;fill:none;stroke-width:.8}
.lt{stroke:#4AEAFF;fill:none;stroke-width:.4;opacity:.4}
.a{stroke:#D4A24C;fill:none;stroke-width:.8}
.af{fill:#D4A24C;fill-opacity:.15;stroke:#D4A24C;stroke-width:.6}
.f{fill:#4AEAFF;fill-opacity:.03;stroke:#4AEAFF;stroke-width:.8}
.fb{fill:#4AEAFF;fill-opacity:.06;stroke:#4AEAFF;stroke-width:1}
.tx{font-family:'Courier New',monospace;font-size:9px;fill:#D4A24C;letter-spacing:.12em;text-anchor:middle}
.txd{font-family:'Courier New',monospace;font-size:7px;fill:#4AEAFF;opacity:.5}
</style>
<defs>
<filter id="g" x="-20%" y="-20%" width="140%" height="140%">
<feGaussianBlur stdDeviation="1.5" result="b"/>
<feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
</filter>
<linearGradient id="sc" x1="0" y1="0" x2="0" y2="1">
<stop offset="0%" stop-color="#4AEAFF" stop-opacity="0"/>
<stop offset="45%" stop-color="#4AEAFF" stop-opacity=".12"/>
<stop offset="50%" stop-color="#4AEAFF" stop-opacity=".35"/>
<stop offset="55%" stop-color="#4AEAFF" stop-opacity=".12"/>
<stop offset="100%" stop-color="#4AEAFF" stop-opacity="0"/>
</linearGradient>
</defs>

<g class="m fl">
<rect x="25" y="60" width="150" height="95" rx="4" class="f"/>
<rect x="30" y="65" width="140" height="85" rx="3" class="lt"/>

<rect x="38" y="72" width="55" height="22" rx="2" class="fb"/>
<circle cx="65" cy="83" r="6" class="af p"/>
<circle cx="65" cy="83" r="3" stroke="#D4A24C" stroke-width=".4" fill="none"/>

<rect x="38" y="100" width="35" height="45" rx="3" class="f"/>
<circle cx="56" cy="122" r="12" class="l" stroke-width="1"/>
<circle cx="56" cy="122" r="8" class="lt"/>
<circle cx="56" cy="122" r="3" class="a" stroke-width=".6"/>
<line x1="56" y1="110" x2="56" y2="113" class="a" stroke-width=".5"/>
<line x1="56" y1="131" x2="56" y2="134" class="a" stroke-width=".5"/>
<line x1="44" y1="122" x2="47" y2="122" class="a" stroke-width=".5"/>
<line x1="65" y1="122" x2="68" y2="122" class="a" stroke-width=".5"/>

<rect x="85" y="75" width="30" height="12" rx="2" class="fb"/>
<rect x="120" y="75" width="30" height="12" rx="2" class="f"/>

<line x1="100" y1="92" x2="100" y2="145" class="a" stroke-width=".4" stroke-dasharray="2,3"/>
<rect x="88" y="105" width="25" height="35" rx="2" class="l" stroke-width=".4" stroke-dasharray="2,2"/>

<rect x="130" y="95" width="28" height="50" rx="3" class="f"/>
<circle cx="144" cy="120" r="10" class="l"/>
<circle cx="144" cy="120" r="6" class="lt"/>
<circle cx="144" cy="120" r="2" fill="#D4A24C" fill-opacity=".3" class="p2"/>

<rect x="25" y="155" width="150" height="8" rx="1" class="f" stroke-width=".6"/>

<rect x="38" y="163" width="8" height="65" rx="1" class="f"/>
<rect x="154" y="163" width="8" height="65" rx="1" class="f"/>
<rect x="32" y="225" width="20" height="5" rx="1" class="l" stroke-width=".5"/>
<rect x="148" y="225" width="20" height="5" rx="1" class="l" stroke-width=".5"/>

<rect x="55" y="175" width="30" height="40" rx="2" class="l" stroke-width=".3" stroke-dasharray="2,2"/>
<rect x="115" y="175" width="30" height="40" rx="2" class="l" stroke-width=".3" stroke-dasharray="2,2"/>

<rect x="80" y="68" width="12" height="4" rx="1" fill="#D4A24C" fill-opacity=".25" stroke="#D4A24C" stroke-width=".4"/>
<circle cx="86" cy="70" r="1" fill="#D4A24C" fill-opacity=".7" class="p"/>
</g>

<g style="animation:scan 3.5s linear infinite;opacity:.5">
<rect x="25" y="0" width="150" height="250" fill="url(#sc)"/>
</g>

<ellipse cx="100" cy="245" rx="70" ry="8" fill="#4AEAFF" fill-opacity=".02" stroke="#4AEAFF" stroke-width=".2" opacity=".4"/>

<text x="100" y="270" class="tx">ESPRESSO</text>
<text x="100" y="282" class="txd" text-anchor="middle" class="p">GROVE ASSET · LEFT</text>

<text x="18" y="80" class="txd">PWR 4.2kW</text>
<text x="18" y="90" class="txd">BOILER: IND</text>
<text x="18" y="215" class="txd">SN: LM-PB2</text>
<text x="18" y="225" class="txd">IOT: ACTIVE</text>
</svg>