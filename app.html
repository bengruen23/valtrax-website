// ============ COMPUTED HELPERS ============
function depreciate(orig, year, hours, type) {
  const ageYears = 2026 - year;
  // straight-line floor + hours-based decay for off-road
  const ageDecay = Math.max(0, 1 - ageYears * 0.07);
  const hoursDecay = hours ? Math.max(0.25, 1 - (hours / 12000) * 0.55) : 1;
  // trucks depreciate on miles/age, equipment on hours
  const fmv = type === 'Truck' ? orig * ageDecay * 0.92 : orig * ageDecay * hoursDecay;
  return Math.round(fmv);
}
function olv(fmv) { return Math.round(fmv * 0.78); }
function flv(fmv) { return Math.round(fmv * 0.62); }

function healthScore(asset) {
  const ageYears = 2026 - asset.year;
  const ageHealth = Math.max(0, 100 - ageYears * 6);
  const hoursHealth = asset.hours ? Math.max(0, 100 - (asset.hours / 12000) * 100) : 90;
  return Math.round((ageHealth * 0.35 + hoursHealth * 0.65));
}

function ltv(asset) {
  const fmv = depreciate(asset.originalCost, asset.year, asset.hours, asset.type);
  const collateralValue = olv(fmv);
  return collateralValue > 0 ? asset.loanBalance / collateralValue : 0;
}

function alertLevel(asset) {
  const r = ltv(asset);
  const h = healthScore(asset);
  if (r > 0.85 || h < 30) return 'critical';
  if (r > 0.70 || h < 50) return 'warn';
  return 'ok';
}

// 24-month historical valuation curve for the drawer
function valuationHistory(asset) {
  const fmv = depreciate(asset.originalCost, asset.year, asset.hours, asset.type);
  const out = [];
  for (let i = 23; i >= 0; i--) {
    const monthlyDecay = 1 - (i * 0.008) - (Math.sin(i / 3) * 0.012);
    const noise = 1 + (Math.random() - 0.5) * 0.025;
    const v = fmv * monthlyDecay * noise;
    out.push({
      month: `M-${i}`,
      fmv: Math.round(v),
      olv: Math.round(v * 0.78),
      loan: Math.round(asset.loanBalance * (1 + i * 0.018)),
    });
  }
  return out;
}

const fmt = (n) => '$' + Math.round(n).toLocaleString('en-US');
const fmtM = (n) => {
  if (n >= 1e6) return '$' + (n / 1e6).toFixed(2) + 'M';
  if (n >= 1e3) return '$' + (n / 1e3).toFixed(0) + 'K';
  return '$' + Math.round(n);
};
const pct = (n) => (n * 100).toFixed(1) + '%';

function Stat({ label, value, sub, accent }) {

function PortfolioStrip({ assets }) {
  const stats = useMemo(() => {
    let fmv = 0, col = 0, exp = 0, alerts = 0;
    assets.forEach(a => {
      const f = depreciate(a.originalCost, a.year, a.hours, a.type);
      fmv += f;
      col += olv(f);
      exp += a.loanBalance;
      if (alertLevel(a) !== 'ok') alerts++;
    });
    return { fmv, col, exp, alerts, ltv: exp / col };
  }, [assets]);

  return (
    <div className="grid grid-cols-5 gap-px bg-[var(--border)]">
      <Stat label="Portfolio FMV" value={fmtM(stats.fmv)} sub={`${assets.length} assets monitored`} accent="text-[var(--amber)]" />
      <Stat label="Collateral Value (OLV)" value={fmtM(stats.col)} sub="78% of FMV blended" accent="text-[var(--text)]" />
      <Stat label="Loan Exposure" value={fmtM(stats.exp)} sub="aggregate balance" />
      <Stat label="Portfolio LTV" value={pct(stats.ltv)} sub={stats.ltv > 0.7 ? "above policy" : "within policy"} accent={stats.ltv > 0.7 ? 'text-[var(--red)]' : 'text-[var(--green)]'} />
      <Stat label="Active Alerts" value={String(stats.alerts).padStart(2, '0')} sub="covenant + health" accent={stats.alerts > 0 ? 'text-[var(--red)]' : 'text-[var(--green)]'} />
    </div>
  );
}

      </div>

                {lvl === 'critical' ? 'CRITICAL' : 'WATCH'}

            </div>
            <div className="text-[11px] text-[var(--text)] mb-0.5">{a.make} {a.model} • {a.year}</div>
            <div className="text-[10px] text-[var(--dim)]">{a.borrower}</div>
            <div className="flex gap-3 mt-1.5 text-[10px] num">
              <span className="text-[var(--dim)]">LTV <span className="text-[var(--red)]">{pct(r)}</span></span>

        ))}
        {alerts.length === 0 && (
          <div className="px-4 py-8 text-center text-[var(--dim)] text-[11px]">NO ACTIVE ALERTS</div>
        )}
      </div>
    </div>
  );
}

  // FRED-style macro context (static values for demo, would be live from FRED API)
  const series = [
    { label: 'CONSTR PPI (BLS)', val: '324.6', delta: '+0.3%', color: 'var(--green)' },

      </div>

        {series.map(s => (

function PortfolioChart({ assets }) {
  // synthesize a 24-month aggregate FMV/Loan curve
  const data = useMemo(() => {
    const out = [];
    for (let i = 23; i >= 0; i--) {
      let fmv = 0, loan = 0;
      assets.forEach(a => {
        const baseFmv = depreciate(a.originalCost, a.year, a.hours, a.type);
        const decay = 1 - (i * 0.006) - (Math.sin(i / 4) * 0.008);
        const noise = 1 + (Math.random() - 0.5) * 0.012;
        fmv += baseFmv * decay * noise;
        loan += a.loanBalance * (1 + i * 0.012);
      });
      out.push({
        month: i === 0 ? 'NOW' : `-${i}M`,
        fmv: Math.round(fmv / 1e6 * 10) / 10,
        loan: Math.round(loan / 1e6 * 10) / 10,
      });
    }
    return out;
  }, [assets]);

  return (
    <div className="grid-card h-full">
      <div className="px-4 py-3 border-b border-[var(--border)] flex items-center justify-between">
        <span className="label text-[var(--amber)]">▸ PORTFOLIO TRAJECTORY · 24M</span>
        <div className="flex items-center gap-3 text-[10px]">
          <span className="flex items-center gap-1.5"><span className="w-2 h-0.5 bg-[var(--amber)]"></span><span className="text-[var(--dim)]">FMV</span></span>
          <span className="flex items-center gap-1.5"><span className="w-2 h-0.5 bg-[var(--blue)]"></span><span className="text-[var(--dim)]">LOAN</span></span>
        </div>
      </div>
      <div className="p-3 h-[260px]">
        <ResponsiveContainer width="100%" height="100%">
          <AreaChart data={data} margin={{ top: 10, right: 10, left: 0, bottom: 5 }}>
            <defs>
              <linearGradient id="fmvg" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stopColor="#ffb000" stopOpacity={0.25} />
                <stop offset="100%" stopColor="#ffb000" stopOpacity={0} />
              </linearGradient>
            </defs>
            <CartesianGrid stroke="#1f2937" strokeDasharray="2 4" vertical={false} />
            <XAxis dataKey="month" stroke="#6b7785" tick={{ fontSize: 10, fontFamily: 'IBM Plex Mono' }} />
            <YAxis stroke="#6b7785" tick={{ fontSize: 10, fontFamily: 'IBM Plex Mono' }} tickFormatter={(v) => `$${v}M`} />
            <Tooltip
              contentStyle={{ background: '#0f1419', border: '1px solid #2a3441', fontFamily: 'IBM Plex Mono', fontSize: 11 }}
              labelStyle={{ color: '#ffb000' }}
              formatter={(v) => [`$${v}M`, '']}
            />
            <Area type="monotone" dataKey="fmv" stroke="#ffb000" strokeWidth={1.5} fill="url(#fmvg)" />
            <Line type="monotone" dataKey="loan" stroke="#4d9fff" strokeWidth={1.5} dot={false} />
          </AreaChart>
        </ResponsiveContainer>
      </div>
    </div>
  );
}

function AssetDrawer({ asset, onClose }) {
  const [vinData, setVinData] = useState(null);
  const [vinLoading, setVinLoading] = useState(false);
  const [vinError, setVinError] = useState(null);

  if (!asset) return null;

  const fmv = depreciate(asset.originalCost, asset.year, asset.hours, asset.type);
  const collateralValue = olv(fmv);
  const liqValue = flv(fmv);
  const r = ltv(asset);
  const h = healthScore(asset);
  const lvl = alertLevel(asset);
  const history = useMemo(() => valuationHistory(asset), [asset]);

  async function decodeVIN() {
    if (!asset.vin) return;
    setVinLoading(true); setVinError(null); setVinData(null);
    try {
      const res = await fetch(`https://vpic.nhtsa.dot.gov/api/vehicles/decodevin/${asset.vin}?format=json`);
      const json = await res.json();
      const fields = ['Make', 'Model', 'Model Year', 'Body Class', 'Vehicle Type', 'Manufacturer Name', 'Plant Country', 'Engine Configuration', 'Engine Number of Cylinders', 'Displacement (L)', 'Fuel Type - Primary', 'GVWR'];
      const map = {};
      json.Results.forEach(r => {
        if (fields.includes(r.Variable) && r.Value && r.Value !== 'Not Applicable') {
          map[r.Variable] = r.Value;
        }
      });
      setVinData(map);
    } catch (e) {
      setVinError('NHTSA API unreachable');
    } finally {
      setVinLoading(false);
    }
  }

  return (
    <div className="fixed inset-0 z-50 flex" onClick={onClose}>
      <div className="flex-1 bg-black/60"></div>
      <div className="w-[640px] bg-[var(--bg)] border-l border-[var(--border)] slide-in overflow-y-auto" onClick={(e) => e.stopPropagation()}>
        {/* Drawer header */}
        <div className="border-b border-[var(--border)] px-5 py-4 flex items-start justify-between sticky top-0 bg-[var(--bg)] z-10">
          <div>
            <div className="flex items-center gap-2 mb-1">
              <div className={`w-1.5 h-1.5 rounded-full ${lvl === 'critical' ? 'bg-[var(--red)] pulse-dot' : lvl === 'warn' ? 'bg-[var(--amber)] pulse-dot' : 'bg-[var(--green)]'}`}></div>
              <span className="num text-[var(--amber)] text-[12px] tracking-wider">{asset.id}</span>
              <span className="label">{asset.type}</span>
            </div>
            <h2 className="mono text-2xl font-light flicker">{asset.make} <span className="text-[var(--muted)]">{asset.model}</span></h2>
            <div className="text-[11px] text-[var(--dim)] mt-1 num">{asset.year} · {asset.hours ? `${asset.hours.toLocaleString()} hrs` : 'on-road'} · {asset.location}</div>
          </div>
          <button onClick={onClose} className="text-[var(--dim)] hover:text-[var(--amber)] text-xl leading-none">×</button>
        </div>

        {/* Valuation grid */}
        <div className="grid grid-cols-3 gap-px bg-[var(--border)]">
          <div className="bg-[var(--bg-1)] px-4 py-3">
            <div className="label mb-1">FMV</div>
            <div className="mono text-xl text-[var(--amber)] num">{fmtM(fmv)}</div>
            <div className="text-[10px] text-[var(--dim)] num mt-0.5">vs. orig {fmtM(asset.originalCost)}</div>
          </div>
          <div className="bg-[var(--bg-1)] px-4 py-3">
            <div className="label mb-1">OLV (collat)</div>
            <div className="mono text-xl text-[var(--text)] num">{fmtM(collateralValue)}</div>
            <div className="text-[10px] text-[var(--dim)] num mt-0.5">78% of FMV</div>
          </div>
          <div className="bg-[var(--bg-1)] px-4 py-3">
            <div className="label mb-1">FLV (forced)</div>
            <div className="mono text-xl text-[var(--muted)] num">{fmtM(liqValue)}</div>
            <div className="text-[10px] text-[var(--dim)] num mt-0.5">62% of FMV</div>
          </div>
          <div className="bg-[var(--bg-1)] px-4 py-3">
            <div className="label mb-1">Loan Balance</div>
            <div className="mono text-xl text-[var(--text)] num">{fmtM(asset.loanBalance)}</div>
            <div className="text-[10px] text-[var(--dim)] num mt-0.5">orig adv {fmtM(asset.originAdvance)}</div>
          </div>
          <div className="bg-[var(--bg-1)] px-4 py-3">
            <div className="label mb-1">LTV</div>
            <div className="mono text-xl num" style={{ color: r > 0.85 ? 'var(--red)' : r > 0.70 ? 'var(--amber)' : 'var(--green)' }}>{pct(r)}</div>
            <div className="text-[10px] text-[var(--dim)] num mt-0.5">policy ≤ 70%</div>
          </div>
          <div className="bg-[var(--bg-1)] px-4 py-3">
            <div className="label mb-1">Health Index</div>
            <div className="mono text-xl num" style={{ color: h >= 70 ? 'var(--green)' : h >= 50 ? 'var(--amber)' : 'var(--red)' }}>{h}</div>
            <div className="text-[10px] text-[var(--dim)] mt-0.5">age + utilization</div>
          </div>
        </div>

        {/* Valuation chart */}
        <div className="border-b border-[var(--border)] p-4">
          <div className="label mb-3 text-[var(--amber)]">▸ VALUATION HISTORY · 24M</div>
          <div className="h-[200px]">
            <ResponsiveContainer width="100%" height="100%">
              <LineChart data={history} margin={{ top: 5, right: 10, left: 0, bottom: 5 }}>
                <CartesianGrid stroke="#1f2937" strokeDasharray="2 4" vertical={false} />
                <XAxis dataKey="month" stroke="#6b7785" tick={{ fontSize: 9, fontFamily: 'IBM Plex Mono' }} interval={3} />
                <YAxis stroke="#6b7785" tick={{ fontSize: 9, fontFamily: 'IBM Plex Mono' }} tickFormatter={(v) => `$${(v/1000).toFixed(0)}K`} />
                <Tooltip
                  contentStyle={{ background: '#0f1419', border: '1px solid #2a3441', fontFamily: 'IBM Plex Mono', fontSize: 10 }}
                  labelStyle={{ color: '#ffb000' }}
                  formatter={(v, name) => [fmt(v), name.toUpperCase()]}
                />
                <Line type="monotone" dataKey="fmv" stroke="#ffb000" strokeWidth={1.5} dot={false} name="FMV" />
                <Line type="monotone" dataKey="olv" stroke="#94a3b8" strokeWidth={1} dot={false} name="OLV" strokeDasharray="3 3" />
                <Line type="monotone" dataKey="loan" stroke="#4d9fff" strokeWidth={1.5} dot={false} name="LOAN" />
              </LineChart>
            </ResponsiveContainer>
          </div>
        </div>

        {/* Borrower */}
        <div className="border-b border-[var(--border)] p-4">
          <div className="label mb-3 text-[var(--amber)]">▸ OBLIGOR</div>
          <div className="grid grid-cols-2 gap-y-2 text-[11px]">
            <div className="text-[var(--dim)]">Borrower</div>
            <div className="text-[var(--text)]">{asset.borrower}</div>
            <div className="text-[var(--dim)]">Location</div>
            <div className="text-[var(--text)]">{asset.location}</div>
            <div className="text-[var(--dim)]">Serial / VIN</div>
            <div className="text-[var(--text)] num">{asset.vin || asset.serial}</div>
            <div className="text-[var(--dim)]">OFAC Screen</div>
            <div className="text-[var(--green)]">✓ CLEAR · {new Date().toLocaleDateString()}</div>
            <div className="text-[var(--dim)]">UCC Filing</div>
            <div className="text-[var(--text)] num">FL-{Math.floor(Math.random() * 90000000 + 10000000)}</div>
          </div>
        </div>

        {/* LIVE NHTSA INTEGRATION */}
        {asset.vin && (
          <div className="border-b border-[var(--border)] p-4">
            <div className="flex items-center justify-between mb-3">
              <span className="label text-[var(--amber)]">▸ NHTSA vPIC · LIVE DECODE</span>
              <button
                onClick={decodeVIN}
                disabled={vinLoading}
                className="text-[10px] tracking-wider px-2.5 py-1 border border-[var(--amber)] text-[var(--amber)] hover:bg-[var(--amber)] hover:text-[var(--bg)] transition disabled:opacity-50">
                {vinLoading ? 'QUERYING...' : 'DECODE VIN →'}
              </button>
            </div>
            {!vinData && !vinLoading && !vinError && (
              <div className="text-[11px] text-[var(--dim)]">
                Click DECODE VIN to query the public NHTSA vPIC API in real time.
                <div className="num text-[var(--muted)] mt-1">VIN: {asset.vin}</div>
              </div>
            )}
            {vinLoading && (
              <div className="text-[11px] text-[var(--amber)] blink">▸ querying vpic.nhtsa.dot.gov ...</div>
            )}
            {vinError && (
              <div className="text-[11px] text-[var(--red)]">⚠ {vinError}</div>
            )}
            {vinData && (
              <div className="grid grid-cols-2 gap-y-1.5 text-[11px] flicker">
                {Object.entries(vinData).map(([k, v]) => (
                  <React.Fragment key={k}>
                    <div className="text-[var(--dim)]">{k}</div>
                    <div className="text-[var(--green)]">{v}</div>
                  </React.Fragment>
                ))}
                <div className="col-span-2 mt-2 pt-2 border-t border-[var(--border)] text-[9px] text-[var(--dim)] tracking-wider">
                  ✓ VERIFIED VIA NHTSA vPIC · {new Date().toUTCString()}
                </div>
              </div>
            )}
          </div>
        )}

        {/* Actions */}
        <div className="p-4 flex gap-2">
          <button className="flex-1 text-[10px] tracking-wider py-2 border border-[var(--border-2)] text-[var(--muted)] hover:border-[var(--amber)] hover:text-[var(--amber)] transition">EXPORT PDF APPRAISAL</button>
          <button className="flex-1 text-[10px] tracking-wider py-2 border border-[var(--border-2)] text-[var(--muted)] hover:border-[var(--amber)] hover:text-[var(--amber)] transition">REQUEST FIELD INSPECTION</button>
        </div>
      </div>
    </div>
  );
}

  const [selected, setSelected] = useState(null);
  const [filter, setFilter] = useState('all');

  useEffect(() => {
    const t = setInterval(() => setNow(new Date()), 1000);
    return () => clearInterval(t);
  }, []);

  return (
    <div className="min-h-screen relative">
      <Header now={now} />

      <div className="relative z-10 p-4 space-y-4">
        <PortfolioStrip assets={FLEET} />

        <div className="grid grid-cols-3 gap-4">
          <div className="col-span-2">
            <PortfolioChart assets={FLEET} />
          </div>
          <div>
            <MacroPanel />
          </div>
        </div>

        <div className="grid grid-cols-3 gap-4">
          <div className="col-span-2">
            <FleetTable assets={FLEET} onSelect={setSelected} filter={filter} setFilter={setFilter} />
          </div>
          <div>
            <AlertsPanel assets={FLEET} />
          </div>
        </div>

        <div className="grid-card px-4 py-3 flex items-center justify-between text-[10px]">
          <div className="flex gap-6 text-[var(--dim)]">
            <span><span className="text-[var(--green)]">●</span> NHTSA vPIC <span className="text-[var(--green)]">CONNECTED</span></span>
            <span><span className="text-[var(--green)]">●</span> MarketCheck <span className="text-[var(--muted)]">READY</span></span>
            <span><span className="text-[var(--green)]">●</span> QuickBooks Online <span className="text-[var(--muted)]">READY</span></span>
            <span><span className="text-[var(--green)]">●</span> Traccar <span className="text-[var(--muted)]">READY</span></span>
            <span><span className="text-[var(--green)]">●</span> NOAA · FRED · OFAC <span className="text-[var(--muted)]">READY</span></span>
          </div>
          <div className="text-[var(--dim)] num">VALTRAX · v0.1.0-demo · {new Date().toISOString().split('T')[0]}</div>
        </div>
      </div>

      <AssetDrawer asset={selected} onClose={() => setSelected(null)} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
