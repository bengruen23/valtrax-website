// =================== ENGINE ===================
function depreciate(orig, year, hours, type) {
  const ageYears = 2026 - year;
  const ageDecay = Math.max(0, 1 - ageYears * 0.07);
  const hoursDecay = hours ? Math.max(0.25, 1 - (hours / 12000) * 0.55) : 1;
  return Math.round(type === 'Truck' ? orig * ageDecay * 0.92 : orig * ageDecay * hoursDecay);
}
const olv = (f) => Math.round(f * 0.78);
const flv = (f) => Math.round(f * 0.62);
function healthScore(a) {
  const ageY = 2026 - a.year;
  const ah = Math.max(0, 100 - ageY * 6);
  const hh = a.hours ? Math.max(0, 100 - (a.hours / 12000) * 100) : 90;
  return Math.round(ah * 0.35 + hh * 0.65);
}
function ltv(a) {
  const f = depreciate(a.originalCost, a.year, a.hours, a.type);
  const cv = olv(f);
  return cv > 0 ? a.loanBalance / cv : 0;
}
function alertLevel(a) {
  const r = ltv(a); const h = healthScore(a);
  if (r > 0.85 || h < 30) return 'critical';
  if (r > 0.70 || h < 50) return 'warn';
  return 'ok';
}
function valuationHistory(a) {
  const fmv = depreciate(a.originalCost, a.year, a.hours, a.type);
  const out = [];
  for (let i = 23; i >= 0; i--) {
    const decay = 1 - i * 0.008 - Math.sin(i / 3) * 0.012;
    const noise = 1 + (Math.random() - 0.5) * 0.025;
    const v = fmv * decay * noise;
    out.push({ month: 23 - i, fmv: Math.round(v), olv: Math.round(v * 0.78), loan: Math.round(a.loanBalance * (1 + i * 0.018)) });
  }
  return out;
}
const fmt = (n) => '$' + Math.round(n).toLocaleString('en-US');
const fmtM = (n) => { if (n >= 1e6) return '$' + (n / 1e6).toFixed(2) + 'M'; if (n >= 1e3) return '$' + (n / 1e3).toFixed(0) + 'K'; return '$' + Math.round(n); };
const pct = (n) => (n * 100).toFixed(1) + '%';

// Find comps for an asset

// =================== CHART ===================
function LineChart({ data, keys, height = 220, width = 700 }) {
  if (!data || data.length === 0) return null;
  const padL = 50, padR = 15, padT = 15, padB = 25;
  const cw = width - padL - padR, ch = height - padT - padB;
  const allVals = data.flatMap(d => keys.map(k => d[k.key]));
  const minY = Math.min(...allVals) * 0.92, maxY = Math.max(...allVals) * 1.08;
  const xStep = cw / (data.length - 1);
  const yScale = (v) => padT + ch - ((v - minY) / (maxY - minY)) * ch;
  const xScale = (i) => padL + i * xStep;
  const ticks = Array.from({ length: 5 }, (_, i) => minY + (maxY - minY) * (i / 4));
  return (
    <svg viewBox={`0 0 ${width} ${height}`} className="w-full h-full" preserveAspectRatio="none">
      {ticks.map((v, i) => (
        <g key={i}>
          <line x1={padL} x2={width - padR} y1={yScale(v)} y2={yScale(v)} stroke="#1f2937" strokeDasharray="2 4" />
          <text x={padL - 8} y={yScale(v) + 3} fill="#6b7785" fontSize="9" textAnchor="end" fontFamily="IBM Plex Mono">${(v / 1000).toFixed(0)}K</text>
        </g>
      ))}
      {data.map((d, i) => i % 4 === 0 && (
        <text key={i} x={xScale(i)} y={height - 8} fill="#6b7785" fontSize="9" textAnchor="middle" fontFamily="IBM Plex Mono">
          {i === data.length - 1 ? 'NOW' : `-${data.length - 1 - i}M`}
        </text>
      ))}
      {keys.map(k => {
        const path = data.map((d, i) => `${i === 0 ? 'M' : 'L'} ${xScale(i)} ${yScale(d[k.key])}`).join(' ');
        const area = k.fill ? `${path} L ${xScale(data.length - 1)} ${padT + ch} L ${xScale(0)} ${padT + ch} Z` : null;
        return (
          <g key={k.key}>
            {area && <path d={area} fill={k.fill} opacity="0.15" />}
            <path d={path} fill="none" stroke={k.color} strokeWidth={k.width || 1.5} strokeDasharray={k.dash || ''} />
          </g>
        );
      })}
    </svg>
  );
}

          Unauthorized access is prohibited and monitored. All session activity is logged

        </div>

        <form onSubmit={submit}>

          <span>UTC</span><span className="text-right num text-[var(--muted)]">{now.toUTCString().split(' ').slice(1, 5).join(' ')}</span>

function PortfolioStrip({ assets }) {
  const stats = useMemo(() => {
    let fmv = 0, col = 0, exp = 0, alerts = 0;
    assets.forEach(a => {
      const f = depreciate(a.originalCost, a.year, a.hours, a.type);
      fmv += f; col += olv(f); exp += a.loanBalance;
      if (alertLevel(a) !== 'ok') alerts++;
    });
    return { fmv, col, exp, alerts, ltv: exp / col };
  }, [assets]);
  return (
    <div className="grid grid-cols-5 gap-px bg-[var(--border)]">
      <Stat label="Portfolio FMV" value={fmtM(stats.fmv)} sub={`${assets.length} assets monitored`} accent="text-[var(--amber)]" />

      <Stat label="Loan Exposure" value={fmtM(stats.exp)} sub="aggregate balance" />
      <Stat label="Portfolio LTV" value={pct(stats.ltv)} sub={stats.ltv > 0.7 ? "above policy" : "within policy"} accent={stats.ltv > 0.7 ? 'text-[var(--red)]' : 'text-[var(--green)]'} />

function PortfolioChart({ assets }) {
  const data = useMemo(() => {
    const out = [];
    for (let i = 23; i >= 0; i--) {
      let f = 0, l = 0;
      assets.forEach(a => {
        const base = depreciate(a.originalCost, a.year, a.hours, a.type);
        const decay = 1 - i * 0.006 - Math.sin(i / 4) * 0.008;
        const noise = 1 + (Math.random() - 0.5) * 0.012;
        f += base * decay * noise;
        l += a.loanBalance * (1 + i * 0.012);
      });
      out.push({ month: 23 - i, fmv: Math.round(f), loan: Math.round(l) });
    }
    return out;
  }, [assets]);
  return (
    <div className="grid-card h-full">
      <div className="px-4 py-3 border-b border-[var(--border)] flex items-center justify-between">
        <span className="label text-[var(--amber)]">▸ PORTFOLIO TRAJECTORY · 24M</span>

      </div>
    </div>
  );
}

function CovenantsPage({ onSelect }) {
  // synthesize covenants per asset
  const covenants = FLEET.flatMap(a => {
    const r = ltv(a); const h = healthScore(a);
    return [
      { asset: a, type: 'Max LTV', threshold: 0.70, current: r, breached: r > 0.70, severity: r > 0.85 ? 'critical' : r > 0.70 ? 'warn' : 'ok', kind: 'ratio' },
      { asset: a, type: 'Min Health', threshold: 50, current: h, breached: h < 50, severity: h < 30 ? 'critical' : h < 50 ? 'warn' : 'ok', kind: 'score' },
      { asset: a, type: 'Max Hours', threshold: 10000, current: a.hours || 0, breached: (a.hours || 0) > 10000, severity: (a.hours || 0) > 10000 ? 'warn' : 'ok', kind: 'hours' },
    ];
  }).filter(c => c.threshold);

  const breached = covenants.filter(c => c.breached);

        <div className="label mb-2 text-[var(--amber)]">▸ GROVE ASSET</div>
        <h1 className="mono text-3xl font-light">Coffee Collateral Workspace</h1>
        <div className="text-[12px] text-[var(--muted)] mt-2 max-w-3xl">
          Dedicated workspace for financed espresso machines, market comps, and machine reference data.
        </div>
      </div>
      <div className="grid-card px-6 py-3 flex items-center justify-between">
        <nav className="flex items-center gap-5 text-[10px] tracking-[0.15em] uppercase">
          {tabs.map(t => (
            <a key={t.k} onClick={() => setSubRoute(t.k)} className={`cursor-pointer pb-0.5 ${subRoute === t.k ? 'text-[var(--amber)] border-b border-[var(--amber)]' : 'text-[var(--dim)] hover:text-[var(--text)]'}`}>
              {t.l}
            </a>
          ))}
        </nav>
        <div className="text-[10px] text-[var(--dim)] num">FLEET {GROVE_FLEET.length} · COMPS {GROVE_COMPS.length}</div>
      </div>
      {subRoute === 'fleet' && <GroveFleetTable assets={GROVE_FLEET} onSelect={onSelect} />}
      {subRoute === 'comps' && <GroveCompsPage comps={GROVE_COMPS} />}
      {subRoute === 'atlas' && <GroveAtlas />}
    </div>
  );
}

// =================== ASSET DRAWER ===================
function AssetDrawer({ asset, onClose }) {
  const [vinData, setVinData] = useState(null);
  const [vinLoading, setVinLoading] = useState(false);
  const [vinError, setVinError] = useState(null);
  const history = useMemo(() => asset ? valuationHistory(asset) : [], [asset]);
  if (!asset) return null;
  const fmv = depreciate(asset.originalCost, asset.year, asset.hours, asset.type);
  const cv = olv(fmv); const lq = flv(fmv); const r = ltv(asset); const h = healthScore(asset); const lvl = alertLevel(asset);
  const assetComps = compsFor(asset);

  async function decodeVIN() {
    if (!asset.vin) return;
    setVinLoading(true); setVinError(null); setVinData(null);
    try {
      const res = await fetch(`https://vpic.nhtsa.dot.gov/api/vehicles/decodevin/${asset.vin}?format=json`);
      const json = await res.json();
      const fields = ['Make', 'Model', 'Model Year', 'Body Class', 'Vehicle Type', 'Manufacturer Name', 'Plant Country', 'Engine Configuration', 'Engine Number of Cylinders', 'Displacement (L)', 'Fuel Type - Primary', 'GVWR'];
      const map = {};
      json.Results.forEach(rr => { if (fields.includes(rr.Variable) && rr.Value && rr.Value !== 'Not Applicable') map[rr.Variable] = rr.Value; });
      setVinData(map);
    } catch (e) { setVinError('NHTSA API unreachable'); }
    finally { setVinLoading(false); }
  }

  return (
    <div className="fixed inset-0 z-50 flex" onClick={onClose}>
      <div className="flex-1 bg-black/60"></div>
      <div className="w-[640px] bg-[var(--bg)] border-l border-[var(--border)] slide-in overflow-y-auto" onClick={(e) => e.stopPropagation()}>
        <div className="border-b border-[var(--border)] px-5 py-4 flex items-start justify-between sticky top-0 bg-[var(--bg)] z-10">
          <div>
            <div className="flex items-center gap-2 mb-1">
              <div className={`w-1.5 h-1.5 rounded-full ${lvl === 'critical' ? 'bg-[var(--red)] pulse-dot' : lvl === 'warn' ? 'bg-[var(--amber)] pulse-dot' : 'bg-[var(--green)]'}`}></div>
              <span className="num text-[var(--amber)] text-[12px] tracking-wider">{asset.id}</span>
              <span className="label">{asset.type}</span>
            </div>
            <h2 className="mono text-2xl font-light flicker">{asset.make} <span className="text-[var(--muted)]">{asset.model}</span></h2>
            <div className="text-[11px] text-[var(--dim)] mt-1 num">{asset.year} · {asset.hours ? `${asset.hours.toLocaleString()} hrs` : 'on-road'} · {asset.location}</div>
          </div>
          <button onClick={onClose} className="text-[var(--dim)] hover:text-[var(--amber)] text-xl leading-none">×</button>
       {asset.image && (
        <div className="border-b border-[var(--border)] relative overflow-hidden" style={{ height: 220 }}>
          <img src={asset.image} alt={`${asset.make} ${asset.model}`} className="w-full h-full object-cover" style={{ filter: 'grayscale(0.2) contrast(1.05) brightness(0.92)' }} />
          <div className="absolute inset-0 pointer-events-none" style={{ background: 'linear-gradient(180deg, transparent 0%, transparent 60%, var(--bg) 100%)' }}></div>
          <div className="absolute bottom-3 left-4 text-[9px] tracking-wider text-[var(--amber)] num">▸ ASSET IMAGE · ON-FILE</div>
        </div>
      )}
        </div>
        <div className="grid grid-cols-3 gap-px bg-[var(--border)]">
          <div className="bg-[var(--bg-1)] px-4 py-3"><div className="label mb-1">FMV</div><div className="mono text-xl text-[var(--amber)] num">{fmtM(fmv)}</div><div className="text-[10px] text-[var(--dim)] num mt-0.5">vs orig {fmtM(asset.originalCost)}</div></div>
          <div className="bg-[var(--bg-1)] px-4 py-3"><div className="label mb-1">OLV (collat)</div><div className="mono text-xl text-[var(--text)] num">{fmtM(cv)}</div><div className="text-[10px] text-[var(--dim)] num mt-0.5">78% of FMV</div></div>
          <div className="bg-[var(--bg-1)] px-4 py-3"><div className="label mb-1">FLV (forced)</div><div className="mono text-xl text-[var(--muted)] num">{fmtM(lq)}</div><div className="text-[10px] text-[var(--dim)] num mt-0.5">62% of FMV</div></div>
          <div className="bg-[var(--bg-1)] px-4 py-3"><div className="label mb-1">Loan Balance</div><div className="mono text-xl text-[var(--text)] num">{fmtM(asset.loanBalance)}</div><div className="text-[10px] text-[var(--dim)] num mt-0.5">orig adv {fmtM(asset.originAdvance)}</div></div>
          <div className="bg-[var(--bg-1)] px-4 py-3"><div className="label mb-1">LTV</div><div className="mono text-xl num" style={{ color: r > 0.85 ? 'var(--red)' : r > 0.70 ? 'var(--amber)' : 'var(--green)' }}>{pct(r)}</div><div className="text-[10px] text-[var(--dim)] num mt-0.5">policy ≤ 70%</div></div>
          <div className="bg-[var(--bg-1)] px-4 py-3"><div className="label mb-1">Health Index</div><div className="mono text-xl num" style={{ color: h >= 70 ? 'var(--green)' : h >= 50 ? 'var(--amber)' : 'var(--red)' }}>{h}</div><div className="text-[10px] text-[var(--dim)] mt-0.5">age + utilization</div></div>
        </div>
        <div className="border-b border-[var(--border)] p-4">
          <div className="label mb-3 text-[var(--amber)]">▸ VALUATION HISTORY · 24M</div>
          <div style={{ height: 200 }}>
            <LineChart data={history} keys={[
              { key: 'fmv', color: '#ffb000', width: 1.5 },
              { key: 'olv', color: '#94a3b8', width: 1, dash: '3 3' },
              { key: 'loan', color: '#4d9fff', width: 1.5 },
            ]} height={200} width={580} />
          </div>
          <div className="flex gap-4 mt-2 text-[10px]">
            <span className="flex items-center gap-1.5"><span className="w-2 h-0.5 bg-[var(--amber)]"></span><span className="text-[var(--dim)]">FMV</span></span>
            <span className="flex items-center gap-1.5"><span className="w-2 h-0.5 bg-[var(--muted)]"></span><span className="text-[var(--dim)]">OLV</span></span>
            <span className="flex items-center gap-1.5"><span className="w-2 h-0.5 bg-[var(--blue)]"></span><span className="text-[var(--dim)]">LOAN</span></span>
          </div>
        </div>
        {assetComps.length > 0 && (
          <div className="border-b border-[var(--border)] p-4">
            <div className="label mb-3 text-[var(--amber)]">▸ COMPARABLE SALES · {assetComps.length} FOUND</div>
            <div className="space-y-1.5 text-[11px]">
              {assetComps.slice(0, 4).map((c, i) => (
                <div key={i} className="flex items-center justify-between border-b border-[var(--border)] pb-1.5">
                  <div>
                    <span className="text-[var(--text)]">{c.source}</span>
                    <span className="text-[var(--dim)]"> · {c.location}</span>
                  </div>
                  <div className="flex items-center gap-3">
                    <span className="text-[10px] text-[var(--dim)]">{c.condition}</span>
                    <span className="num text-[var(--amber)]">{fmt(c.salePrice)}</span>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}
        <div className="border-b border-[var(--border)] p-4">
          <div className="label mb-3 text-[var(--amber)]">▸ OBLIGOR</div>
          <div className="grid grid-cols-2 gap-y-2 text-[11px]">
            <div className="text-[var(--dim)]">Borrower</div><div className="text-[var(--text)]">{asset.borrower}</div>
            <div className="text-[var(--dim)]">Lender</div><div className="text-[var(--text)]">{asset.lender}</div>
            <div className="text-[var(--dim)]">Location</div><div className="text-[var(--text)]">{asset.location}</div>
            <div className="text-[var(--dim)]">Serial / VIN</div><div className="text-[var(--text)] num">{asset.vin || asset.serial}</div>
            <div className="text-[var(--dim)]">OFAC Screen</div><div className="text-[var(--green)]">✓ CLEAR · {new Date().toLocaleDateString()}</div>
            <div className="text-[var(--dim)]">UCC Filing</div><div className="text-[var(--text)] num">FL-{Math.floor(Math.random() * 90000000 + 10000000)}</div>
          </div>
        </div>
        {asset.vin && (
          <div className="border-b border-[var(--border)] p-4">
            <div className="flex items-center justify-between mb-3">
              <span className="label text-[var(--amber)]">▸ NHTSA vPIC · LIVE DECODE</span>
              <button onClick={decodeVIN} disabled={vinLoading} className="text-[10px] tracking-wider px-2.5 py-1 border border-[var(--amber)] text-[var(--amber)] hover:bg-[var(--amber)] hover:text-[var(--bg)] transition disabled:opacity-50">
                {vinLoading ? 'QUERYING...' : 'DECODE VIN →'}
              </button>
            </div>
            {!vinData && !vinLoading && !vinError && (<div className="text-[11px] text-[var(--dim)]">Click DECODE VIN to query the public NHTSA vPIC API in real time.<div className="num text-[var(--muted)] mt-1">VIN: {asset.vin}</div></div>)}
            {vinLoading && <div className="text-[11px] text-[var(--amber)] blink">▸ querying vpic.nhtsa.dot.gov ...</div>}
            {vinError && <div className="text-[11px] text-[var(--red)]">⚠ {vinError}</div>}
            {vinData && (
              <div className="grid grid-cols-2 gap-y-1.5 text-[11px] flicker">
                {Object.entries(vinData).map(([k, v]) => (
                  <React.Fragment key={k}>
                    <div className="text-[var(--dim)]">{k}</div>
                    <div className="text-[var(--green)]">{v}</div>
                  </React.Fragment>
                ))}
                <div className="col-span-2 mt-2 pt-2 border-t border-[var(--border)] text-[9px] text-[var(--dim)] tracking-wider">✓ VERIFIED VIA NHTSA vPIC · {new Date().toUTCString()}</div>
              </div>
            )}
          </div>
        )}
        <div className="p-4 flex gap-2">
          <button className="flex-1 text-[10px] tracking-wider py-2 border border-[var(--border-2)] text-[var(--muted)] hover:border-[var(--amber)] hover:text-[var(--amber)] transition">EXPORT PDF APPRAISAL</button>
          <button className="flex-1 text-[10px] tracking-wider py-2 border border-[var(--border-2)] text-[var(--muted)] hover:border-[var(--amber)] hover:text-[var(--amber)] transition">REQUEST FIELD INSPECTION</button>
        </div>
      </div>
    </div>
  );
}

// =================== APP ===================
function App() {
  const [authed, setAuthed] = useState(false);
  const [now, setNow] = useState(new Date());
  const [selected, setSelected] = useState(null);
  const [route, setRoute] = useState('portfolio');

  useEffect(() => {
    setAuthed(sessionStorage.getItem('vtx-auth') === '1');
    const t = setInterval(() => setNow(new Date()), 1000);
    return () => clearInterval(t);
  }, []);

  function logout() {
    sessionStorage.removeItem('vtx-auth');
    setAuthed(false);
  }

  if (!authed) return <PasswordGate onUnlock={() => setAuthed(true)} />;

  return (
    <div className="min-h-screen relative">
      <Header now={now} route={route} setRoute={setRoute} onLogout={logout} />
      <div className="relative z-10 p-4">
        {route === 'portfolio' && <PortfolioPage onSelect={setSelected} />}
        {route === 'grove' && <GrovePage onSelect={setSelected} />}
        {route === 'watchlist' && <WatchlistPage onSelect={setSelected} />}
        {route === 'comps' && <CompsPage />}
        {route === 'covenants' && <CovenantsPage onSelect={setSelected} />}
        {route === 'reports' && (
          <div className="grid-card p-12 text-center fade-up">
            <div className="label mb-2 text-[var(--amber)]">▸ REPORTS</div>
            <div className="mono text-2xl font-light mb-2">Module in development</div>
            <div className="text-[12px] text-[var(--muted)]">PDF appraisal export, quarterly portfolio reports, regulatory packages.</div>
          </div>
        )}
        <div className="grid-card px-4 py-3 mt-4 flex items-center justify-between text-[10px]">
          <div className="flex gap-6 text-[var(--dim)]">
            <span><span className="text-[var(--green)]">●</span> NHTSA vPIC <span className="text-[var(--green)]">CONNECTED</span></span>
            <span><span className="text-[var(--green)]">●</span> MarketCheck <span className="text-[var(--muted)]">READY</span></span>
            <span><span className="text-[var(--green)]">●</span> QuickBooks Online <span className="text-[var(--muted)]">READY</span></span>
            <span><span className="text-[var(--green)]">●</span> Traccar <span className="text-[var(--muted)]">READY</span></span>
            <span><span className="text-[var(--green)]">●</span> NOAA · FRED · OFAC <span className="text-[var(--muted)]">READY</span></span>
          </div>
          <div className="text-[var(--dim)] num">VALTRAX · v0.2.0-demo · {new Date().toISOString().split('T')[0]}</div>
        </div>
      </div>
      <AssetDrawer asset={selected} onClose={() => setSelected(null)} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
