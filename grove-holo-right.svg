<svg width="200" viewBox="0 0 200 420" xmlns="http://www.w3.org/2000/svg">
<style>
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}
@keyframes scan{0%{transform:translateY(-20px)}100%{transform:translateY(400px)}}
@keyframes flicker{0%,94%,100%{opacity:1}96%{opacity:.5}98%{opacity:.8}}
@keyframes flow{0%{stroke-dashoffset:20}100%{stroke-dashoffset:0}}
.m{animation:float 4s ease-in-out infinite;animation-delay:.5s;filter:url(#g2)}
.fl{animation:flicker 8s ease-in-out infinite}
.p{animation:pulse 2s ease-in-out infinite}
.p2{animation:pulse 3s ease-in-out infinite;animation-delay:1s}
.fw{animation:flow 2s linear infinite}
.l{stroke:#4AEAFF;fill:none;stroke-width:.8}
.lt{stroke:#4AEAFF;fill:none;stroke-width:.4;opacity:.4}
.a{stroke:#D4A24C;fill:none;stroke-width:.8}
.af{fill:#D4A24C;fill-opacity:.15;stroke:#D4A24C;stroke-width:.6}
.f{fill:#4AEAFF;fill-opacity:.03;stroke:#4AEAFF;stroke-width:.8}
.fb{fill:#4AEAFF;fill-opacity:.06;stroke:#4AEAFF;stroke-width:1}
.tx{font-family:'Courier New',monospace;font-size:9px;fill:#D4A24C;letter-spacing:.12em;text-anchor:middle}
.txd{font-family:'Courier New',monospace;font-size:7px;fill:#4AEAFF;opacity:.5}
</style>
<defs>
<filter id="g2" x="-20%" y="-20%" width="140%" height="140%">
<feGaussianBlur stdDeviation="1.5" result="b"/>
<feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
</filter>
<linearGradient id="sc2" x1="0" y1="0" x2="0" y2="1">
<stop offset="0%" stop-color="#4AEAFF" stop-opacity="0"/>
<stop offset="45%" stop-color="#4AEAFF" stop-opacity=".12"/>
<stop offset="50%" stop-color="#4AEAFF" stop-opacity=".35"/>
<stop offset="55%" stop-color="#4AEAFF" stop-opacity=".12"/>
<stop offset="100%" stop-color="#4AEAFF" stop-opacity="0"/>
</linearGradient>
</defs>

<g class="m fl">
<rect x="30" y="55" width="140" height="175" rx="4" class="f"/>
<rect x="35" y="60" width="130" height="165" rx="3" class="lt"/>

<text x="100" y="75" text-anchor="middle" class="txd" style="opacity:.3;font-size:6px">CROSS-SECTION VIEW</text>

<rect x="55" y="82" width="90" height="55" rx="20" class="fb"/>
<rect x="60" y="87" width="80" height="45" rx="17" class="l" stroke-width=".6"/>
<ellipse cx="100" cy="110" rx="25" ry="15" class="lt" stroke-dasharray="3,2"/>
<circle cx="100" cy="110" r="5" class="af p"/>
<text x="100" y="113" text-anchor="middle" class="txd" style="opacity:.7;font-size:6px;fill:#D4A24C">93.4°C</text>

<line x1="100" y1="137" x2="100" y2="155" class="l fw" stroke-dasharray="4,4"/>
<line x1="100" y1="155" x2="70" y2="175" class="l fw" stroke-dasharray="4,4"/>
<line x1="100" y1="155" x2="130" y2="175" class="l fw" stroke-dasharray="4,4"/>

<circle cx="70" cy="180" r="12" class="l"/>
<circle cx="70" cy="180" r="8" class="lt"/>
<circle cx="70" cy="180" r="3" class="af p"/>
<text x="70" y="183" text-anchor="middle" class="txd" style="opacity:.6;font-size:5px;fill:#D4A24C">GR1</text>

<circle cx="130" cy="180" r="12" class="l"/>
<circle cx="130" cy="180" r="8" class="lt"/>
<circle cx="130" cy="180" r="3" class="af p2"/>
<text x="130" y="183" text-anchor="middle" class="txd" style="opacity:.6;font-size:5px;fill:#D4A24C">GR2</text>

<line x1="70" y1="192" x2="70" y2="215" class="a" stroke-width=".4" stroke-dasharray="2,3"/>
<line x1="130" y1="192" x2="130" y2="215" class="a" stroke-width=".4" stroke-dasharray="2,3"/>

<rect x="55" y="215" width="30" height="12" rx="2" class="f" stroke-width=".5"/>
<rect x="115" y="215" width="30" height="12" rx="2" class="f" stroke-width=".5"/>

<line x1="42" y1="105" x2="55" y2="105" class="a" stroke-width=".4"/>
<circle cx="40" cy="105" r="5" class="a" stroke-width=".5"/>
<line x1="37" y1="102" x2="40" y2="105" class="a" stroke-width=".5"/>
<text x="40" y="115" text-anchor="middle" class="txd" style="font-size:5px">1.25bar</text>

<line x1="145" y1="100" x2="158" y2="100" class="a" stroke-width=".4"/>
<rect x="155" y="92" width="12" height="16" rx="2" class="af"/>
<text x="161" y="103" text-anchor="middle" class="txd" style="font-size:5px;fill:#D4A24C">PID</text>

<rect x="45" y="142" width="110" height="8" rx="1" class="f" stroke-width=".3"/>
<rect x="48" y="144" width="20" height="4" rx="1" fill="#4AEAFF" fill-opacity=".1"/>
<rect x="72" y="144" width="20" height="4" rx="1" fill="#4AEAFF" fill-opacity=".08"/>
<rect x="96" y="144" width="20" height="4" rx="1" fill="#D4A24C" fill-opacity=".08"/>
<rect x="120" y="144" width="20" height="4" rx="1" fill="#4AEAFF" fill-opacity=".05"/>
</g>

<g style="animation:scan 4s linear infinite;animation-delay:1s;opacity:.4">
<rect x="30" y="0" width="140" height="250" fill="url(#sc2)"/>
</g>

<ellipse cx="100" cy="245" rx="65" ry="7" fill="#4AEAFF" fill-opacity=".02" stroke="#4AEAFF" stroke-width=".2" opacity=".3"/>

<text x="100" y="270" class="tx">BREW BASE</text>
<text x="100" y="282" class="txd" text-anchor="middle">GROVE ASSET · RIGHT</text>

<text x="160" y="80" class="txd">TEMP: 93.4°C</text>
<text x="160" y="90" class="txd">PRES: 9.0bar</text>
<text x="160" y="200" class="txd">FLOW: 2.4ml/s</text>
<text x="160" y="210" class="txd">SHOTS: 1,245</text>
</svg>